# Conditionals: `if: github.ref == 'refs/heads/main'`
name: conditional-demo

on:
 push:
   branches: [main]
 pull_request:
   branches: [main]
 workflow_dispatch:

jobs:
  on-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: only run on push events
        run: echo "Only run on push events"
        
      - name: step with continue-on-error
        run: |
          echo "This step will fail"
          exit 1
        continue-on-error: true
        
      - name: next step after failure
        run:
         echo "Workflow continues even after failure"
        